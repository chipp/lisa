name: Publish and deploy

on:
  push:
    branches:
      - main

jobs:
  push:
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'push'

    strategy:
      matrix:
        include:
          - binary: alisa
            mode: image
          - binary: elisa
            mode: binary
          - binary: elisheba
            mode: binary
          - binary: elizabeth
            mode: image
          - binary: isabel
            mode: binary

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Log into registry
        run: echo ${{ secrets.CR_PAT }} | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@83094fe91195fdf87fa647051ab34148d96d3f1b

      - name: Build image
        run: |
          IMAGE_ID=ghcr.io/chipp/${{ matrix.binary }}
          RUST_VERSION=$(cat .rust-version)

          docker buildx build . --file bin/${{ matrix.binary }}/Dockerfile \
             --load \
             --progress plain \
             --tag $IMAGE_ID:latest \
             --build-arg RUST_VERSION="${RUST_VERSION}" \
             --build-arg VERSION="0.1.${{ github.run_number }}" \
             --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
             --cache-from=type=gha,scope=${{ matrix.binary }} \
             --cache-to=type=gha,scope=${{ matrix.binary }},mode=max

          docker images -a

      - name: Compose arm64 runnable image
        if: matrix.mode == 'image'
        run: |
          IMAGE_ID=ghcr.io/chipp/${{ matrix.binary }}

          docker images -a

          mkdir -p build
          docker run --rm -v "$PWD/build:/build" ghcr.io/chipp/${{ matrix.binary }}:latest \
            cp /root/${{ matrix.binary }} /build/${{ matrix.binary }}
          sudo chown -R "$USER":"$USER" build

          docker buildx build . --file conf/arm64.Dockerfile \
             --push \
             --platform linux/arm64 \
             --progress plain \
             --tag $IMAGE_ID:latest \
             --tag $IMAGE_ID:0.1.${{ github.run_number }} \
             --build-arg BINARY=${{ matrix.binary }} \
             --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
             --label "org.opencontainers.image.version=0.1.${{ github.run_number }}"

      - name: Extract arm64 binary
        if: matrix.mode == 'binary'
        run: |
          docker images -a

          mkdir -p build
          docker run --rm -v "$PWD/build:/build" ghcr.io/chipp/${{ matrix.binary }}:latest \
            cp /root/${{ matrix.binary }} /build/${{ matrix.binary }}
          sudo chown -R "$USER":"$USER" build

      - name: Build deb package
        if: matrix.mode == 'binary'
        run: |
          scripts/package_deb.sh \
            ${{ matrix.binary }} \
            0.1.${{ github.run_number }} \
            build/${{ matrix.binary }} \
            build

          dpkg-deb --info build/${{ matrix.binary }}_0.1.${{ github.run_number }}_arm64.deb
          dpkg-deb --contents build/${{ matrix.binary }}_0.1.${{ github.run_number }}_arm64.deb

      - name: Archive arm64 deb artifact
        if: matrix.mode == 'binary'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.binary }}
          path: build/${{ matrix.binary }}_*.deb
          retention-days: 1

  deploy:
   runs-on: ubuntu-24.04-arm
   needs: push
   steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Add ssh key
        run: |
          mkdir ~/.ssh/

          echo "${{ secrets.ssh_key }}" > ~/.ssh/id_rsa

          echo "ezio.chipp.dev ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHynflleQHqQg0GHDph+GkNQARa56hAlJJf4ogGKbwsh" >> ~/.ssh/known_hosts
          echo "pi4.chipp.dev ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIC8v1CMClR4LoWiClc3TLiaWb/pxmEwav0BWGw+JfUiN" >> ~/.ssh/known_hosts

          echo "Host pi4.chipp.dev" > ~/.ssh/config
          echo "  ProxyCommand $PWD/cloudflared-linux-arm64 access ssh --hostname %h" >> ~/.ssh/config

          chmod -R 700 ~/.ssh/

      - name: Install cloudflared
        run: |
          curl -sSLO https://github.com/cloudflare/cloudflared/releases/download/2026.5.0/cloudflared-linux-arm64
          echo "2dc0945345677d27de3ae390a31c3b168866b48766da5f4cfd3fc473ce572303  cloudflared-linux-arm64" | sha256sum -c -
          chmod +x cloudflared-linux-arm64

      - name: Deploy alisa and elizabeth
        run: |
          eval `ssh-agent -s`
          echo "${{ secrets.ssh_key_passphrase }}" | ssh-add ~/.ssh/id_rsa

          scp conf/docker-compose.yml conf/mq.conf \
            github@ezio.chipp.dev:/web/lisa

          ssh github@ezio.chipp.dev \
            "cd /web/lisa && docker compose down --remove-orphans --rmi all && docker compose up -d"

      - name: Download elisa
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: elisa

      - name: Download elisheba
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: elisheba

      - name: Download isabel
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: isabel

      - name: Deploy elisa, elisheba, isabel
        run: |
          eval `ssh-agent -s`
          echo "${{ secrets.ssh_key_passphrase }}" | ssh-add ~/.ssh/id_rsa

          export TUNNEL_SERVICE_TOKEN_ID=${{ secrets.TUNNEL_SERVICE_TOKEN_ID }}
          export TUNNEL_SERVICE_TOKEN_SECRET=${{ secrets.TUNNEL_SERVICE_TOKEN_SECRET }}

          mkdir -p lisa-deploy
          cp ./*.deb lisa-deploy/

          ssh chipp@pi4.chipp.dev "mkdir -p /tmp/lisa-deploy"
          rsync -av --delete lisa-deploy/ chipp@pi4.chipp.dev:/tmp/lisa-deploy/

          ssh chipp@pi4.chipp.dev "sudo systemctl stop elisa elisheba isabel || true"
          ssh chipp@pi4.chipp.dev "sudo dpkg -i /tmp/lisa-deploy/*.deb"

          ssh chipp@pi4.chipp.dev "sudo systemctl start elisa elisheba isabel"
