name: Test

on:
  pull_request:
    branches:
      - main

jobs:
  fmt:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Verify rust versions match
        run: |
          TOOLCHAIN_VERSION=$(sed -n 's/^channel[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' rust-toolchain.toml)
          FILE_VERSION=$(cut -d_ -f1 .rust-version)

          if [ "$TOOLCHAIN_VERSION" != "$FILE_VERSION" ]; then
            echo "Version mismatch: rust-toolchain.toml=$TOOLCHAIN_VERSION .rust-version=$FILE_VERSION"
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libbluetooth-dev

      - name: Install clippy
        run: rustup component add clippy

      - name: Check clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  deny:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        checks:
          - advisories
          - bans
          - licenses
          - sources

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1
        with:
          command: check ${{ matrix.checks }}

  deb:
    runs-on: ubuntu-24.04-arm

    strategy:
      matrix:
        binary:
          - elisa
          - elisheba
          - isabel

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Verify packaging script syntax
        run: bash -n scripts/package_deb.sh

      - name: Build deb package
        run: |
          mkdir -p target/deb-check build
          printf '#!/bin/sh\nexit 0\n' > target/deb-check/${{ matrix.binary }}
          chmod 755 target/deb-check/${{ matrix.binary }}

          scripts/package_deb.sh \
             ${{ matrix.binary }} \
             0.1.0 \
             target/deb-check/${{ matrix.binary }} \
             build

      - name: Verify deb package contents
        run: |
          package=build/${{ matrix.binary }}_0.1.0_arm64.deb

          dpkg-deb --info "$package"
          dpkg-deb --contents "$package"

          dpkg-deb --field "$package" Package | grep -Fx ${{ matrix.binary }}
          dpkg-deb --field "$package" Version | grep -Fx 0.1.0
          dpkg-deb --field "$package" Architecture | grep -Fx arm64
          dpkg-deb --contents "$package" | grep -F ./usr/bin/${{ matrix.binary }}
          dpkg-deb --contents "$package" | grep -F ./lib/systemd/system/${{ matrix.binary }}.service
          dpkg-deb --contents "$package" | grep -F ./etc/lisa/${{ matrix.binary }}.env.example

          rm -rf target/deb-extract
          mkdir -p target/deb-extract
          dpkg-deb --extract "$package" target/deb-extract
          grep -Fx User=${{ matrix.binary }} target/deb-extract/lib/systemd/system/${{ matrix.binary }}.service
          grep -Fx Group=${{ matrix.binary }} target/deb-extract/lib/systemd/system/${{ matrix.binary }}.service

      - name: Verify architecture override
        if: matrix.binary == 'elisa'
        run: |
          ARCH=amd64 scripts/package_deb.sh \
             ${{ matrix.binary }} \
             0.1.0 \
             target/deb-check/${{ matrix.binary }} \
             build

          package=build/${{ matrix.binary }}_0.1.0_amd64.deb

          dpkg-deb --field "$package" Architecture | grep -Fx amd64

  test:
    runs-on: ubuntu-24.04-arm
    needs: [fmt, clippy, deny]

    strategy:
      matrix:
        binary:
          - alisa
          - elisa
          - elisheba
          - elizabeth
          - isabel

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Log into registry
        run: echo ${{ secrets.CR_PAT }} | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@83094fe91195fdf87fa647051ab34148d96d3f1b

      - name: Test
        run: |
          IMAGE_ID=ghcr.io/chipp/${{ matrix.binary }}
          RUST_VERSION=$(cat .rust-version)

          docker buildx build . --file bin/${{ matrix.binary }}/test.Dockerfile \
             --output type=cacheonly \
             --tag $IMAGE_ID:latest \
             --build-arg RUST_VERSION="${RUST_VERSION}" \
             --cache-from=type=gha,scope=${{ matrix.binary }}-test \
             --cache-to=type=gha,scope=${{ matrix.binary }}-test,mode=max

          docker buildx build . --file bin/${{ matrix.binary }}/Dockerfile \
             --output type=cacheonly \
             --tag $IMAGE_ID:latest \
             --build-arg RUST_VERSION="${RUST_VERSION}" \
             --cache-from=type=gha,scope=${{ matrix.binary }} \
             --cache-to=type=gha,scope=${{ matrix.binary }},mode=max
